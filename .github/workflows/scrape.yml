name: Update Race Data

on:
  schedule:
    # Jalan otomatis setiap jam 00:00 WIB (17:00 UTC)
    - cron: '0 17 * * *'
  workflow_dispatch: # Biar bisa kamu klik "Run" manual di tab Actions

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write # Wajib biar GitHub bisa nge-push commit balik

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run Scraper
        run: python scraper.py # Sesuaikan path kalau scraper.py ada di dalam folder

      - name: Commit and Push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add races_data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update races_data.json [skip ci]" && git push)
